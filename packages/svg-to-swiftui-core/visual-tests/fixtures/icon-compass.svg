<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="46" fill="#333333"/>
  <circle cx="50" cy="50" r="42" fill="white"/>
  <!-- Compass diamond - North/East pointer -->
  <polygon points="50,12 58,50 50,88 42,50" fill="#333333"/>
  <!-- Center circle -->
  <circle cx="50" cy="50" r="4" fill="white"/>
  <!-- Cardinal direction ticks -->
  <line x1="50" y1="4" x2="50" y2="10" stroke="#333333" stroke-width="2"/>
  <line x1="50" y1="90" x2="50" y2="96" stroke="#333333" stroke-width="2"/>
  <line x1="4" y1="50" x2="10" y2="50" stroke="#333333" stroke-width="2"/>
  <line x1="90" y1="50" x2="96" y2="50" stroke="#333333" stroke-width="2"/>
</svg>