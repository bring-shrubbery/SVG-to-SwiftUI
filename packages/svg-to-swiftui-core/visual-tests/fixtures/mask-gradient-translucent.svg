<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 90">
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="180" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="black"/>
      <stop offset=".45" stop-color="#ffcc00" stop-opacity=".75"/>
      <stop offset="1" stop-color="white"/>
    </linearGradient>
    <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse">
      <rect width="18" height="18" fill="#222"/>
      <circle cx="9" cy="9" r="7" fill="white" fill-opacity=".7"/>
    </pattern>
    <mask id="complex" x="0" y="0" width="180" height="90" maskUnits="userSpaceOnUse" mask-type="alpha">
      <rect width="180" height="90" fill="url(#fade)"/>
      <circle cx="90" cy="45" r="32" fill="url(#dots)" opacity=".65"/>
    </mask>
  </defs>
  <rect width="180" height="90" fill="#7b2cbf" mask="url(#complex)"/>
</svg>
