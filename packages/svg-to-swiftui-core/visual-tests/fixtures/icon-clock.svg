<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Clock face -->
  <circle cx="50" cy="50" r="45" fill="#333333"/>
  <circle cx="50" cy="50" r="40" fill="white"/>
  <!-- Hour hand -->
  <line x1="50" y1="50" x2="50" y2="28" stroke="#333333" stroke-width="5" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="50" y1="50" x2="72" y2="50" stroke="#333333" stroke-width="3" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="50" cy="50" r="3" fill="#333333"/>
  <!-- Hour markers -->
  <line x1="50" y1="14" x2="50" y2="20" stroke="#333333" stroke-width="2"/>
  <line x1="50" y1="80" x2="50" y2="86" stroke="#333333" stroke-width="2"/>
  <line x1="14" y1="50" x2="20" y2="50" stroke="#333333" stroke-width="2"/>
  <line x1="80" y1="50" x2="86" y2="50" stroke="#333333" stroke-width="2"/>
</svg>