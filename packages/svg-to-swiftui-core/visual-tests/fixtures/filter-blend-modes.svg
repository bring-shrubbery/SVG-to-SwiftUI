  <g>
    <rect x="0" y="0" width="40" height="40" filter="url(#normal)"/><rect x="40" y="0" width="40" height="40" filter="url(#multiply)"/><rect x="80" y="0" width="40" height="40" filter="url(#screen)"/><rect x="120" y="0" width="40" height="40" filter="url(#overlay)"/><rect x="160" y="0" width="40" height="40" filter="url(#darken)"/><rect x="200" y="0" width="40" height="40" filter="url(#lighten)"/><rect x="240" y="0" width="40" height="40" filter="url(#color-dodge)"/><rect x="280" y="0" width="40" height="40" filter="url(#color-burn)"/>
