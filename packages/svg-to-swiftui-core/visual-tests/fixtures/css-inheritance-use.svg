<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40">
  <style>
    #dot { fill: inherit; stroke: white; stroke-width: 4 }
  </style>
  <defs>
    <symbol id="badge" viewBox="0 0 40 40">
      <circle id="dot" cx="20" cy="20" r="15" />
    </symbol>
  </defs>
  <use href="#badge" width="40" height="40" fill="#2563eb" style="--tile: #2563eb; fill: var(--tile)" />
  <use href="#badge" x="40" width="40" height="40" fill="#dc2626"
    style="--tile: #dc2626; fill: var(--tile)" />
  <use href="#badge" x="80" width="40" height="40" fill="#16a34a"
    style="--tile: #16a34a; fill: var(--tile)" />
</svg>
